name: Bourse Agent Daily

on:
  schedule:
    - cron: '25 8 * * *'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installation des dépendances
        run: pip install -r requirements.txt

      - name: Lancement de l'agent
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO:            ${{ secrets.EMAIL_TO }}
        run: |
          python -c "import tracker; print('TRACKER OK')"
          python agent.py
          
      - name: Sauvegarde du tracker CSV
       run: |
        git config user.name "Agent Bourse Bot"
        git config user.email "bot@agent-bourse.com"
        git fetch origin main
        git checkout origin/main -- . 2>/dev/null || true
        git add historique.csv
        git commit -m "Mise a jour tracker" || echo "Rien a commiter"
        git push
